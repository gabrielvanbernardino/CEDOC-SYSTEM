<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="cedoc-api-url" content="">
  <meta name="cedoc-api-key" content="">
  <meta name="cedoc-supabase-url" content="">
  <meta name="cedoc-supabase-publishable-key" content="">
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cedoc">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>cedoc</title>
  <link rel="manifest" href="manifest.json">
  <script>
    (function () {
      var base = document.querySelector('base');
      if (!base) return;
      var href = base.getAttribute('href') || '';
      if (href.indexOf('/') === -1) return;
      base.setAttribute('href', new URL('.', window.location.href).pathname);
    })();
  </script>
  <script src="runtime-config.js"></script>
  <script>
    (function () {
      var runtime = window.CEDOC_RUNTIME_CONFIG || {};
      var mapping = {
        'api-url': runtime.apiUrl,
        'api-key': runtime.apiKey,
        'supabase-url': runtime.supabaseUrl,
        'supabase-publishable-key': runtime.supabasePublishableKey
      };

      Object.keys(mapping).forEach(function (key) {
        var value = mapping[key];
        if (typeof value !== 'string' || value.trim() === '') return;
        var meta = document.querySelector('meta[name="cedoc-' + key + '"]');
        if (!meta) return;
        meta.setAttribute('content', value.trim());
      });
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js?v=20260605-daily-month-picker" async></script>
</body>
</html>
